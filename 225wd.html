button{border:none;color:#fff;cursor:pointer}

.progress{width:100%;height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.bar{height:100%;width:0%;background:#16a34a}
.small{font-size:14px;color:#64748b;margin-top:8px}
@media(max-width:600px){.card{font-size:19px}.hindi{font-size:18px}}
</style>
</head>
<body>
<div class="container">
<h1>PTE Write From Dictation Practice</h1>

<div class="tracker">
  <div class="stat">Sentence <span id="currentNo">1</span> / <span id="totalNo"></span></div>
  <div class="stat">Completed: <span id="completed">0</span></div>
  <div class="stat">Pending: <span id="pending">0</span></div>
  <div class="stat">Average Score: <span id="avgScore">0%</span></div>
  <div class="progress"><div id="progressBar" class="bar"></div></div>
</div>

<div class="topbar">
  <div>
    <label><b>Go to:</b></label>
    <input type="number" id="jumpNo" min="1" value="1" style="width:90px" />
    <button class="blue" onclick="jumpSentence()">Open</button>
  </div>
  <div>
    <label><b>Mode:</b></label>
    <select id="mode" onchange="displaySentence(false)">
      <option value="show">Show English</option>
      <option value="hide">Hide English</option>
    </select>
  </div>
  <div>
    <label><b>Speed:</b></label>
    <select id="rate">
      <option value="0.75">Slow</option>
      <option value="0.9" selected>Normal</option>
      <option value="1.05">Fast</option>
    </select>
  </div>
</div>

<div id="sentence" class="card"></div>
<div id="hindi" class="card hindi"></div>

<div class="buttons">
  <button class="orange" onclick="speakSentence()">▶ Listen</button>
  <button class="gray" onclick="stopSpeak()">■ Stop</button>
  <button class="purple" onclick="toggleHindi()">Hindi Show / Hide</button>
</div>

<textarea id="userInput" placeholder="Listen and type the full English sentence here..."></textarea>

<div class="buttons">
  <button class="blue" onclick="checkAnswer()">Check Answer</button>
  <button class="gray" onclick="prevSentence()">Previous</button>
  <button class="green" onclick="nextSentence()">Next</button>
  <button class="purple" onclick="toggleSentence()">English Show / Hide</button>
  <button class="red" onclick="clearText()">Clear</button>
  <button class="red" onclick="resetTracker()">Reset Tracker</button>
</div>

<div id="result" class="result">Result will show here.</div>
<div class="small">Tip: punctuation and capital letters are ignored. Your progress is saved automatically in this browser.</div>
</div>

    "hi": "परीक्षा आगे सूचना तक पोस्ट नहीं की जाएगी।"
  },
  {
    "no": 225,
    "text": "The next lecture will take place at a different location.",
    "hi": "अगला व्याख्यान अलग स्थान पर होगा।"
  }
];

let currentIndex = Number(localStorage.getItem("pte_current_index") || 0);
let showHindi = true;
let tracker = JSON.parse(localStorage.getItem("pte_tracker_hindi_listen") || "{}");

function saveTracker() {
  localStorage.setItem("pte_tracker_hindi_listen", JSON.stringify(tracker));
  localStorage.setItem("pte_current_index", currentIndex);
}

function cleanText(text) {
  return text.toLowerCase()
    .replace(/[.,!?;:"'()\[\]…]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function displaySentence(clearInput=true) {
  const item = sentences[currentIndex];
  document.getElementById("currentNo").innerText = item.no;
  document.getElementById("totalNo").innerText = sentences.length;
  document.getElementById("jumpNo").max = sentences.length;
  document.getElementById("jumpNo").value = item.no;

  const mode = document.getElementById("mode").value;
  document.getElementById("sentence").innerText = mode === "hide"
    ? "English sentence hidden. Click Listen and type your answer."
    : item.text;

  document.getElementById("hindi").style.display = showHindi ? "block" : "none";
  document.getElementById("hindi").innerText = "Hindi meaning: " + item.hi;

  if (clearInput) {
    document.getElementById("userInput").value = "";
    document.getElementById("result").innerHTML = "Result will show here.";
  }
  updateTrackerUI();
  saveTracker();
}

function speakSentence() {
  stopSpeak();
  const item = sentences[currentIndex];
  const utter = new SpeechSynthesisUtterance(item.text);
  utter.lang = "en-US";
  utter.rate = Number(document.getElementById("rate").value);
  utter.pitch = 1;
  speechSynthesis.speak(utter);
}

function stopSpeak() {
  if ("speechSynthesis" in window) speechSynthesis.cancel();
}

function checkAnswer() {
  const item = sentences[currentIndex];
  const correctText = item.text;
  const typedText = document.getElementById("userInput").value;

  const correctWords = cleanText(correctText).split(" ").filter(Boolean);
  const typedWords = cleanText(typedText).split(" ").filter(Boolean);

  let right = 0, wrong = 0, missing = 0, review = "", typedReview = "";
  for (let i = 0; i < correctWords.length; i++) {
    if (typedWords[i] === correctWords[i]) {
      right++;
      review += `<span class="right">${correctWords[i]}</span> `;
    } else if (typedWords[i] === undefined) {
      missing++;
      review += `<span class="missing">${correctWords[i]}</span> `;
    } else {
      wrong++;
      review += `<span class="wrong">${correctWords[i]}</span> `;
    }
  }

  typedWords.forEach((w, i) => {
    if (correctWords[i] === w) typedReview += `<span class="right">${w}</span> `;
    else typedReview += `<span class="wrong">${w}</span> `;
  });

  const extra = Math.max(0, typedWords.length - correctWords.length);
  const totalMistakes = wrong + missing + extra;
  const percentage = correctWords.length ? Math.round((right / correctWords.length) * 100) : 0;

  tracker[item.no] = {
    score: percentage,
    right,
    wrong,
    missing,
    extra,
    mistakes: totalMistakes,
    lastAnswer: typedText,
    checkedAt: new Date().toLocaleString()
  };
  saveTracker();
  updateTrackerUI();

  document.getElementById("result").innerHTML = `
    <p class="right">Right words: ${right}</p>
    <p class="wrong">Wrong words: ${wrong}</p>
    <p class="missing">Missing words: ${missing}</p>
    <p class="extra">Extra words: ${extra}</p>
    <p><b>Total mistakes:</b> ${totalMistakes}</p>
    <p><b>Score:</b> ${percentage}%</p>
    <hr>
    <p><b>Correct sentence review:</b></p>
    <p>${review}</p>
    <p><b>Your typed answer review:</b></p>
    <p>${typedReview || "No answer typed"}</p>
    <p><b>Hindi meaning:</b> ${item.hi}</p>
  `;
}

function updateTrackerUI() {
  const done = Object.keys(tracker).length;
  const pending = sentences.length - done;
  let avg = 0;
  if (done > 0) {
    avg = Math.round(Object.values(tracker).reduce((sum, x) => sum + (x.score || 0), 0) / done);
  }
  document.getElementById("completed").innerText = done;
  document.getElementById("pending").innerText = pending;
  document.getElementById("avgScore").innerText = avg + "%";
  document.getElementById("progressBar").style.width = Math.round((done / sentences.length) * 100) + "%";
}

function nextSentence() {
  currentIndex = (currentIndex + 1) % sentences.length;
  displaySentence();
}

function prevSentence() {
  currentIndex = (currentIndex - 1 + sentences.length) % sentences.length;
  displaySentence();
}

function jumpSentence() {
  const no = parseInt(document.getElementById("jumpNo").value, 10);
  if (no >= 1 && no <= sentences.length) {
    currentIndex = no - 1;
    displaySentence();
  } else {
    alert("Please enter a number from 1 to " + sentences.length);
  }
}

function toggleSentence() {
  const mode = document.getElementById("mode");
  const typed = document.getElementById("userInput").value;
  mode.value = mode.value === "show" ? "hide" : "show";
  displaySentence(false);
  document.getElementById("userInput").value = typed;
}

function toggleHindi() {
  showHindi = !showHindi;
  displaySentence(false);
}

function clearText() {
  document.getElementById("userInput").value = "";
  document.getElementById("result").innerHTML = "Result will show here.";
}

function resetTracker() {
  if (confirm("Reset all completed/pending/score tracker data?")) {
    tracker = {};
    saveTracker();
    updateTrackerUI();
    document.getElementById("result").innerHTML = "Tracker reset completed.";
  }
}

displaySentence();
</script>
</body>
</html>
